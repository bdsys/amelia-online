name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish rather than cancel it
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─── Quality gate: deploy only if lint + typecheck + unit tests pass ──────
  gate:
    name: Quality gate (lint · typecheck · unit tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

  # ─── Build the OpenNext worker, then deploy it to Cloudflare ──────────────
  # `opennextjs-cloudflare deploy` deploys an ALREADY-built app, so we build first.
  # Wrangler authenticates from CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID.
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-22.04
    needs: gate
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build worker (OpenNext)
        run: npm run build:worker

      - name: Deploy to Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync Worker secrets (production)
        run: |
          printf '%s' "$GROWNUPS_PASSWORD" | npx wrangler secret put GROWNUPS_PASSWORD
          printf '%s' "$SESSION_SECRET"    | npx wrangler secret put SESSION_SECRET
          printf '%s' "$INVITE_SLUG"       | npx wrangler secret put INVITE_SLUG
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GROWNUPS_PASSWORD: ${{ secrets.GROWNUPS_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          INVITE_SLUG: ${{ secrets.INVITE_SLUG }}
