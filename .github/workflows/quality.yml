name: Quality

on:
  push:
    branches: [main, dev, preview]
  pull_request:
    branches: [main, dev, preview]

# Cancel in-flight runs for the same branch when a new push arrives
concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Quality gate: lint + typecheck + Vitest unit tests ──────────────────
  quality:
    name: Quality (lint · typecheck · unit tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test

  # ─── Smoke test: build + curl every public route for 200 + key content ───
  # Runs in parallel with the quality job (independent status check).
  # Covers public routes only (robots.txt, sitemap, playground hub) via Next.js
  # `next start`; secret-gated routes (grownups, invite) are covered by E2E (e2e.yml).
  smoke:
    name: Smoke (build · curl routes)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js)
        run: npm run build

      - name: Smoke test (curl routes)
        run: bash scripts/smoke.sh 3002
