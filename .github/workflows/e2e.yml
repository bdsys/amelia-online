name: E2E

on:
  push:
    branches: [main, dev, preview]
  pull_request:
    branches: [main, dev, preview]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── E2E: Playwright on ubuntu-22.04 (Playwright Chromium binaries require it) ──
  # Runs independently of quality.yml — gets its own status check so failures are
  # surfaced clearly on PRs. Runs against the real Workers runtime (`npm run preview`)
  # rather than `next start` because getCloudflareContext only resolves under workerd.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium + deps
        run: npx playwright install chromium --with-deps

      # Write throwaway test credentials to .dev.vars so workerd picks them up at boot.
      # Must happen BEFORE `npm run test:e2e` starts the webServer (build:worker + preview).
      - name: Write E2E test secrets to .dev.vars
        run: node tests/e2e/write-dev-vars.cjs

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      # Upload the Playwright HTML report so failures are inspectable in GitHub UI
      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
