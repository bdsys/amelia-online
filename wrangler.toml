name = "amelia-online"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── Custom domains ────────────────────────────────────────────────────────────
# Apex + www are both attached to the Worker. www is redirected to the apex with
# a 301 by next.config.ts (redirects()), so it must reach the Worker — hence it's
# attached here rather than handled by an edge rule.
[[routes]]
pattern = "amelialass.com"
custom_domain = true
[[routes]]
pattern = "www.amelialass.com"
custom_domain = true

# ── Preview / staging environment ─────────────────────────────────────────────
# Deploy with: npm run deploy:preview  (push to the `preview` branch in CI)
[env.preview]
name = "amelia-online-preview"

[env.preview.assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Uncomment once preview.amelialass.com DNS is ready (Stage B):
# [[env.preview.routes]]
# pattern = "preview.amelialass.com"
# custom_domain = true
