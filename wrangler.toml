name = "amelia-online"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── Custom domains ────────────────────────────────────────────────────────────
# Apex + www are both attached to the Worker. www is redirected to the apex with
# a 301 by next.config.ts (redirects()), so it must reach the Worker — hence it's
# attached here rather than handled by an edge rule.
[[routes]]
pattern = "amelialass.com"
custom_domain = true
[[routes]]
pattern = "www.amelialass.com"
custom_domain = true

# ── Preview / staging environment ─────────────────────────────────────────────
# Separate Worker (amelia-online-preview) on its own staging domain.
# Deployed by deploy-preview.yml on every push to the `preview` branch.
[env.preview]
name = "amelia-online-preview"

[env.preview.assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Staging custom domain. Cloudflare auto-provisions a certificate for this exact
# hostname when the Worker custom domain is attached (may take a few minutes on
# the first deploy). Two levels deep is fine — Workers custom domains issue a
# per-hostname cert rather than relying on the *.amelialass.com universal cert.
[[env.preview.routes]]
pattern = "preview.www.amelialass.com"
custom_domain = true
